<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do list</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header glass"> <h1>Управление задачами</h1> </div>
   
       <main class="main glass">
             <section id="input-area">
                  <input class= "input" type="text" id="task-name" placeholder = "Введите задачу" autocomplete="off">
                  <button class="button" id="add-button">+</button>
            
             </section>
        <div id="error">Пожалуйста, введите название задачи!</div>

        <section class="list-area" id="list-area">
            <h2 class="h2">Список текущих дел:</h2>
            <ul class="task-list" id="task-list">
                 <li>
                     <input type="checkbox" class="checkbox">
                     <span>Установка и настройка Visual Studio Code</span>
                     <button class="delete-button">✖</button>
                </li>
                <li>
                    <input type="checkbox" class="checkbox">
                    <span>Инициализация репозитория Git</span>
                    <button class="delete-button">✖</button>
                </li>
                <li>
                    <input type="checkbox" class="checkbox">
                    <span>Настройка расширения Live Server</span>
                    <button class="delete-button">✖</button>
                </li>
           </ul>
        </section>

    </main>
    
    <script src="script.js"></script>
</body>
</html>
